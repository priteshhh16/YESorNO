<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cute Proposal ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ffd1dc,#ff9eb5);
    position:relative;
}

/* Floating Hearts */

.heart{
    position:absolute;
    bottom:-20px;
    color:white;
    animation: floatUp linear infinite;
    opacity:0.8;
    pointer-events:none;
}

@keyframes floatUp{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

/* Main Card */

.container{

    width:90%;
    max-width:420px;

    background:white;

    border-radius:30px;

    padding:40px 25px;

    text-align:center;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.2);

    position:relative;

    z-index:2;
}

/* Cute Heading */

h1{

    color:#ff4f81;

    font-size:34px;

    line-height:1.4;

    margin-bottom:35px;
}

/* Buttons */

button{

    border:none;

    border-radius:50px;

    padding:16px 30px;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    position:absolute;

    transition:0.08s linear;
}

/* YES Button */

#yesBtn{

    background:#ff4f81;

    color:white;

    left:18%;

    top:55%;

    box-shadow:
    0 0 15px rgba(255,79,129,0.6),
    0 0 30px rgba(255,79,129,0.4);
}

#yesBtn:active{
    transform:scale(0.95);
}

/* NO Button */

#noBtn{

    background:#f1f1f1;

    color:#333;

    left:58%;

    top:55%;
}

/* Success Message */

.message{

    display:none;

    margin-top:100px;

    font-size:30px;

    color:#ff2e6d;

    animation: pop 0.5s ease;
}

@keyframes pop{

    0%{
        transform:scale(0.5);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

/* Mobile */

@media(max-width:480px){

    h1{
        font-size:28px;
    }

    button{
        font-size:18px;
        padding:14px 26px;
    }

    .message{
        font-size:24px;
    }
}

</style>

</head>

<body>

<!-- AUDIO -->

<audio id="noSound"
src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<audio id="yesSound"
src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav">
</audio>

<audio id="loveMusic"
loop
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-11786.mp3">
</audio>

<div class="container">

    <h1>
        Do You Like Me? ❤️
    </h1>

    <button id="yesBtn">
        YES 💖
    </button>

    <button id="noBtn">
        NO 😢
    </button>

    <div class="message" id="message">

        YAYYYYY ❤️<br><br>

        I Knew You'd Say YES 💕

    </div>

</div>

<script>

/* Elements */

const noBtn = document.getElementById("noBtn");

const yesBtn = document.getElementById("yesBtn");

const message = document.getElementById("message");

/* AUDIO */

const noSound =
    document.getElementById("noSound");

const yesSound =
    document.getElementById("yesSound");

const loveMusic =
    document.getElementById("loveMusic");

/* MOVE NO BUTTON */

function moveNoButton(){

    /* Funny Sound */

    noSound.currentTime = 0;

    noSound.play();

    const btnWidth = noBtn.offsetWidth;

    const btnHeight = noBtn.offsetHeight;

    const maxX =
        window.innerWidth - btnWidth;

    const maxY =
        window.innerHeight - btnHeight;

    const randomX =
        Math.random() * maxX;

    const randomY =
        Math.random() * maxY;

    noBtn.style.position = "fixed";

    noBtn.style.left =
        randomX + "px";

    noBtn.style.top =
        randomY + "px";

    /* Random Rotation */

    const rotate =
        Math.random() * 40 - 20;

    noBtn.style.transform =
        `rotate(${rotate}deg)`;

    /* Funny Text */

    const texts = [

        "NO 😭",

        "NOPE 💨",

        "TRY AGAIN 😜",

        "CATCH ME 😆",

        "NUH UH 😝",

        "IMPOSSIBLE 😂",

        "HEHE 😎",

        "NOT TODAY 😏"
    ];

    noBtn.innerHTML =

        texts[
            Math.floor(
                Math.random() * texts.length
            )
        ];
}

/* Desktop */

noBtn.addEventListener(
    "mouseover",
    moveNoButton
);

/* Mobile */

noBtn.addEventListener(
    "touchstart",
    function(e){

        e.preventDefault();

        moveNoButton();
    }
);

/* Cursor Near = Escape */

document.addEventListener(
    "mousemove",
    (e) => {

        const rect =
            noBtn.getBoundingClientRect();

        const distanceX =
            e.clientX - rect.left;

        const distanceY =
            e.clientY - rect.top;

        const distance = Math.sqrt(

            distanceX * distanceX +

            distanceY * distanceY
        );

        if(distance < 120){

            moveNoButton();
        }
    }
);

/* YES BUTTON */

yesBtn.addEventListener(
    "click",
    () => {

        /* Success Sound */

        yesSound.play();

        /* Romantic Music */

        loveMusic.volume = 0.5;

        loveMusic.play();

        yesBtn.style.display = "none";

        noBtn.style.display = "none";

        message.style.display = "block";

        /* Heart Explosion */

        for(let i=0;i<120;i++){

            createHeart();
        }
    }
);

/* Floating Hearts */

function createHeart(){

    const heart =
        document.createElement("div");

    heart.classList.add("heart");

    const emojis = [

        "❤️",

        "💖",

        "💕",

        "💘",

        "💝"
    ];

    heart.innerHTML =

        emojis[
            Math.floor(
                Math.random() * emojis.length
            )
        ];

    heart.style.left =
        Math.random() * 100 + "vw";

    heart.style.fontSize =
        (Math.random() * 30 + 20) + "px";

    heart.style.animationDuration =
        (Math.random() * 2 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    },4000);
}

/* Continuous Hearts */

setInterval(createHeart,200);

</script>

</body>

</html>
